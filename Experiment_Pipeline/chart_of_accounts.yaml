accounts:
  # -------------------------- Assets --------------------------
  - code: "1105"
    name: "Cash"
    type: "Asset"
    subtype: "Current Asset"
    group: "Cash and Cash Equivalents"

  # ============== 1. OPERATING REVENUES (by market) ===========

  # National
  - code: "4135"
    name: "Wholesale and Retail Trade Revenue (National)"
    type: "Revenue"
    subtype: "Operating Revenue"
    group: "National Operating Revenue"

  - code: "4120"
    name: "Manufacturing Revenue (National)"
    type: "Revenue"
    subtype: "Operating Revenue"
    group: "National Operating Revenue"

  # International (exports)
  - code: "4136"
    name: "Wholesale and Retail Trade Revenue (International)"
    type: "Revenue"
    subtype: "Operating Revenue"
    group: "International Operating Revenue"

  - code: "4121"
    name: "Manufacturing Revenue (International)"
    type: "Revenue"
    subtype: "Operating Revenue"
    group: "International Operating Revenue"

  # =================== 2. COSTS / COGS ========================

  # Cost of Sales - National
  - code: "6135"
    name: "Cost of Wholesale and Retail Trade (National)"
    type: "Cost"
    subtype: "Cost of Sales"
    group: "Cost of Sales - National"

  - code: "6120"
    name: "Cost of Manufacturing (National)"
    type: "Cost"
    subtype: "Cost of Sales"
    group: "Cost of Sales - National"

  # Cost of Sales - International
  - code: "6136"
    name: "Cost of Wholesale and Retail Trade (International)"
    type: "Cost"
    subtype: "Cost of Sales"
    group: "Cost of Sales - International"

  - code: "6121"
    name: "Cost of Manufacturing (International)"
    type: "Cost"
    subtype: "Cost of Sales"
    group: "Cost of Sales - International"

  # Cost of Production (your 2.2 block)
  - code: "71"
    name: "Direct Materials Cost"
    type: "Cost"
    subtype: "Cost of Production"
    group: "Cost of Production"

  - code: "711"
    name: "Imported Direct Materials Cost"
    type: "Cost"
    subtype: "Cost of Production"
    group: "Cost of Production"

  # Indirect / Overheads (your 2.2 indirect costs)
  - code: "73"
    name: "Indirect Cost"
    type: "Expense"
    subtype: "Indirect"
    group: "Production Overheads"

  # ================= Non-operating (as in your COA) ===========

  - code: "4140"
    name: "Sale of Non-Inventory Assets"
    type: "Revenue"
    subtype: "Non-Operating Revenues"
    group: "Non-Operating Revenues"

  - code: "6140"
    name: "Cost of Goods Sold (Non-Core)"
    type: "Cost"
    subtype: "Non-Operating Expenses"
    group: "Non-Operating Expenses"

  # -------------------------- Equity --------------------------
  - code: "3115"
    name: "Owner's Equity"
    type: "Equity"
    subtype: "Equity"
    group: "Equity"